<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>my sites</title>
<style>
  :root {
    --link: #00159a;
    --link-visited: #551a8b;
    --ink: #222;
    --muted: #888;
    --rule: #ddd;
    --up: #128a2b;
    --down: #c0392b;
    --bg: #fff;
  }
  * { box-sizing: border-box; }
  body {
    font: 14px/1.5 -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    margin: 0;
    padding: 24px clamp(16px, 5vw, 64px) 64px;
  }
  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 10px;
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  h1 {
    font-size: 26px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .tagline { color: var(--muted); font-style: italic; }
  .toolbar {
    display: flex; align-items: center; gap: 14px;
    margin: 14px 0 26px;
  }
  #search {
    flex: 1 1 280px;
    max-width: 360px;
    padding: 7px 10px;
    border: 1px solid #bbb;
    border-radius: 4px;
    font-size: 14px;
  }
  .meta { color: var(--muted); font-size: 12px; }
  .meta a { color: var(--muted); }

  .columns {
    column-width: 320px;
    column-gap: 40px;
  }
  .cat {
    break-inside: avoid;
    margin: 0 0 30px;
    display: inline-block;
    width: 100%;
  }
  .cat h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #b31217;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 5px;
    margin: 0 0 10px;
  }
  ul { list-style: none; margin: 0; padding: 0; }
  li { margin: 0 0 11px; }
  .row { display: flex; align-items: baseline; gap: 7px; }
  .dot {
    flex: 0 0 auto;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
    margin-top: 6px;
    transition: background .3s;
  }
  .dot.up   { background: var(--up); }
  .dot.down { background: var(--down); }
  a.site {
    color: var(--link);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
  }
  a.site:visited { color: var(--link-visited); }
  a.site:hover { text-decoration: underline; }
  .blurb { color: #555; font-size: 12.5px; margin: 1px 0 0 15px; }
  .url   { color: var(--muted); font-size: 11px; margin: 0 0 0 15px; word-break: break-all; }
  .hidden { display: none; }
  footer { margin-top: 30px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--rule); padding-top: 12px; }
  code { background: #f4f4f4; padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  /* password gate */
  #gate {
    position: fixed; inset: 0; z-index: 9999;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  #gate form {
    width: min(320px, 86vw);
    text-align: center;
  }
  #gate h1 { font-size: 22px; margin: 0 0 4px; }
  #gate p  { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
  #gate input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid #bbb; border-radius: 5px;
  }
  #gate button {
    margin-top: 10px; width: 100%; padding: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    color: #fff; background: var(--link); border: 0; border-radius: 5px;
  }
  #gate .err { color: var(--down); font-size: 12px; min-height: 16px; margin-top: 8px; }
  body.locked { overflow: hidden; }
  #app.hidden { display: none; }
</style>
</head>
<body class="locked">
  <div id="gate">
    <form id="gateForm" autocomplete="off">
      <h1>my sites</h1>
      <p>enter the password to continue</p>
      <input id="gatePass" type="password" placeholder="password" autocomplete="off" autofocus>
      <button type="submit">unlock</button>
      <div class="err" id="gateErr"></div>
    </form>
  </div>

  <div id="app" class="hidden">
  <header>
    <h1 id="title">my sites</h1>
    <span class="tagline" id="tagline"></span>
  </header>

  <div class="toolbar">
    <input id="search" type="search" placeholder="filter sites…" autocomplete="off">
    <span class="meta" id="statusline">loading…</span>
  </div>

  <div class="columns" id="columns"></div>

  <footer>
    Edit <code>sites.json</code> to add, remove, or reorder sites — this page reads it live.
    Green dot = reachable, red = down, grey = not checked yet.
  </footer>
  </div><!-- /#app -->

<script>
const $ = (s, el = document) => el.querySelector(s);

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}

let STATUS = {};

function render(config) {
  document.title = config.title || "my sites";
  $("#title").textContent = config.title || "my sites";
  $("#tagline").textContent = config.tagline || "";

  const cols = $("#columns");
  cols.innerHTML = "";
  let total = 0;

  (config.categories || []).forEach(cat => {
    const box = el("div", "cat");
    box.appendChild(el("h2", null, cat.name));
    const ul = el("ul");

    (cat.sites || []).forEach(site => {
      total++;
      const li = el("li");
      li.dataset.search = (site.name + " " + (site.blurb || "") + " " + site.url).toLowerCase();

      const row = el("div", "row");
      const dot = el("span", "dot");
      dot.dataset.url = site.url;
      row.appendChild(dot);

      const a = el("a", "site", site.name);
      a.href = site.url;
      a.target = "_blank";
      a.rel = "noopener";
      row.appendChild(a);
      li.appendChild(row);

      if (site.blurb) li.appendChild(el("div", "blurb", site.blurb));
      li.appendChild(el("div", "url", site.url.replace(/^https?:\/\//, "")));

      ul.appendChild(li);
    });

    box.appendChild(ul);
    cols.appendChild(box);
  });

  applyStatus();
  filter();
  $("#statusline").textContent = total + " site" + (total === 1 ? "" : "s");
}

function applyStatus() {
  document.querySelectorAll(".dot").forEach(dot => {
    const s = STATUS[dot.dataset.url];
    dot.classList.toggle("up", s === true);
    dot.classList.toggle("down", s === false);
    dot.title = s === true ? "reachable" : s === false ? "unreachable" : "not checked";
  });
}

function filter() {
  const q = $("#search").value.trim().toLowerCase();
  document.querySelectorAll("#columns li").forEach(li => {
    li.classList.toggle("hidden", q && !li.dataset.search.includes(q));
  });
  document.querySelectorAll(".cat").forEach(cat => {
    const anyVisible = [...cat.querySelectorAll("li")].some(li => !li.classList.contains("hidden"));
    cat.style.display = anyVisible ? "" : "none";
  });
}

// Browser-side reachability ping (used when there's no Python backend, e.g.
// on a static host). A no-cors GET resolves for any server response and
// rejects on a network failure/timeout — a good-enough "is it alive" signal.
async function pingClient(url) {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 6000);
    await fetch(url, { mode: "no-cors", cache: "no-store", signal: ctrl.signal });
    clearTimeout(t);
    return true;
  } catch (_) {
    return false;
  }
}

async function loadStatus() {
  // Prefer the server-side check (accurate) when running under server.py…
  try {
    const r = await fetch("/api/status", { cache: "no-store" });
    if (r.ok) {
      STATUS = await r.json();
      applyStatus();
      return;
    }
  } catch (_) { /* no backend — fall through to client-side pings */ }

  // …otherwise (static hosting) ping each site straight from the browser.
  const dots = [...document.querySelectorAll(".dot")];
  await Promise.all(dots.map(async d => {
    STATUS[d.dataset.url] = await pingClient(d.dataset.url);
  }));
  applyStatus();
}

async function boot() {
  let config;
  try {
    const r = await fetch("sites.json", { cache: "no-store" });
    config = await r.json();
  } catch (e) {
    $("#statusline").textContent = "could not load sites.json";
    return;
  }
  render(config);
  $("#search").addEventListener("input", filter);
  loadStatus();
  setInterval(loadStatus, 30000);
}

// ---------------------------------------------------------------------------
// Password gate (client-side). NOTE: this only hides the page from casual
// viewers — it is NOT real security. The password is stored as a SHA-256 hash
// (so it's not in plain sight), but a determined person can still read the
// page source or fetch sites.json directly. For real protection, put auth in
// front of the host (e.g. Cloudflare Access) or on the apps themselves.
//
// To change the password: generate a new hash and paste it below. In the
// browser console run:
//   crypto.subtle.digest("SHA-256", new TextEncoder().encode("YOUR_PASSWORD"))
//     .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")))
const PASS_HASH = "b2e8f9cf55af20460c367b830741bfd67f8151c8bc4b0dda4c79db1331c3f635";
const UNLOCK_KEY = "dash_unlocked";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, "0")).join("");
}

function unlock() {
  document.body.classList.remove("locked");
  $("#gate").style.display = "none";
  $("#app").classList.remove("hidden");
  boot();
}

function initGate() {
  if (sessionStorage.getItem(UNLOCK_KEY) === PASS_HASH) { unlock(); return; }
  const form = $("#gateForm");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const val = $("#gatePass").value;
    const h = await sha256(val);
    if (h === PASS_HASH) {
      sessionStorage.setItem(UNLOCK_KEY, PASS_HASH);
      unlock();
    } else {
      $("#gateErr").textContent = "wrong password";
      $("#gatePass").value = "";
      $("#gatePass").focus();
    }
  });
}

initGate();
</script>
</body>
</html>
